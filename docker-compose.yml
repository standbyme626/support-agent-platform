version: '3.8'

services:
  erpnext:
    image: frappe/erpnext:v16
    container_name: erpnext
    ports:
      - "8080:8080"
      - "9000:9000"
    environment:
      - SITE_NAME=erp.local
      - SITES=erp.local
      - FRAPPE_SITE=erp.local
    volumes:
      - /mnt/f/docker-data/erpnext/frappe-bench:/home/frappe/frappe-bench
    depends_on:
      - mariadb
      - redis
    restart: unless-stopped

  mariadb:
    image: mariadb:10.11
    container_name: erpnext-mariadb
    environment:
      - MYSQL_ROOT_PASSWORD=rootpassword
    volumes:
      - /mnt/f/docker-data/erpnext/mariadb:/var/lib/mysql
    restart: unless-stopped

  redis:
    image: redis:7-bookworm
    container_name: erpnext-redis
    restart: unless-stopped
